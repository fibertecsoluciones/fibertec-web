<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiberTec - Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/inventario.css"> 
</head>
<body>
    <div class="container-inventario">
        <header class="header-pagos">
            <a href="dashboard.html" class="btn-volver-menu">
                <i class="fas fa-arrow-left"></i> Menú Principal
            </a>
            <button class="btn-cerrar-sesion" onclick="cerrarSesion()">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
            <div class="logo-pagos"><span>Fiber<span>Tec</span></span></div>
            <h1>📦 Control de Inventario</h1>
        </header>

        <div class="botones-accion" style="margin-top: 20px; display: flex; justify-content: space-between; padding: 0 20px;">
            <div class="busqueda">
                <input type="text" id="buscarProducto" placeholder="Buscar equipo o material...">
            </div>
            <button class="btn-primario" onclick="abrirModalInventario()">
                <i class="fas fa-plus"></i> Agregar Material
            </button>
        </div>

        <div class="tabla-pagos-container" style="margin: 20px;">
            <table class="tabla-pagos">
                <thead>
                    <tr>
                        <th>Nomenclatura / Material</th>
                        <th>Categoría</th>
                        <th>Stock Actual</th>
                        <th>Unidad</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaInventarioBody"></tbody>
            </table>
        </div>
    </div>

    <div id="modalInventario" class="modal-usuario" style="display: none;">
        <div class="modal-usuario-contenido">
            <div class="modal-header">
                <h3 id="modalInventarioTitulo"><i class="fas fa-box"></i> Nuevo Material</h3>
                <span class="modal-close" onclick="cerrarModalInventario()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="formInventario">
                    <input type="hidden" id="productoId">
                    
                    <div class="campo">
                        <label>Nombre del Material/Equipo *</label>
                        <select id="nombre_articulo" required onchange="verificarCategoria()">
                            <option value="">-- Seleccione Producto --</option>
                            <optgroup label="Fibra Óptica">
                                <option value="FIBRA DROP 1 CO">Fibra Drop 1 Hilo</option>
                                <option value="FIBRA DROP 2 CO">Fibra Drop 2 Hilos</option>
                                <option value="FIBRA ADSS 6 FO">Fibra ADSS 6 Hilos</option>
                            </optgroup>
                            <optgroup label="Equipos de Red">
                                <option value="MODEM HUAWEI 4E">Módem Huawei (4 Antenas)</option>
                                <option value="MODEM HUAWEI 2E">Módem Huawei (2 Antenas)</option>
                                <option value="ONU BRIDGE">ONU Bridge</option>
                                <option value="ROUTER MERCUSYS">Router Mercusys</option>
                            </optgroup>
                            <optgroup label="Otros">
                                <option value="JUMPER SC/APC">Jumper SC/APC 3M</option>
                                <option value="GRAPAS">Grapas (Caja)</option>
                                <option value="TENSORES">Tensores (Pz)</option>
                            </optgroup>
                        </select>
                    </div>
                    
                    <div class="campo">
                        <label>Categoría *</label>
                        <select id="categoria" required onchange="verificarCategoria()">
                            <option value="Equipos">Equipos (ONTs/Routers)</option>
                            <option value="Planta Externa">Planta Externa (Fibras/Jumpers/Herrajes)</option>
                            <option value="Consumibles">Consumibles (Manguitas/Grapas)</option>
                            <option value="Herramientas">Herramientas</option>
                        </select>
                    </div>

                    <div id="seccion-fibra" style="display: none; background: #f0f7ff; padding: 15px; border-radius: 10px; border-left: 5px solid #004a99; margin-bottom: 15px;">
                        <div class="campo">
                            <label>ID Carrete (Generado Automáticamente)</label>
                            <input type="text" id="codigo_fibertec" readonly style="background: #e9ecef; font-weight: bold; color: #004a99;" placeholder="FT-DROP-XXXX">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="campo">
                                <label>Metros Iniciales</label>
                                <input type="number" id="metros_iniciales" placeholder="1000">
                            </div>
                            <div class="campo">
                                <label>Metros Actuales</label>
                                <input type="number" id="metros_actuales" placeholder="1000">
                            </div>
                        </div>
                    </div>

                    <div id="seccion-cantidad-normal">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="campo">
                                <label>Cantidad Actual *</label>
                                <input type="number" id="cantidad_actual" min="0" value="0">
                            </div>
                            <div class="campo">
                                <label>Stock Mínimo</label>
                                <input type="number" id="stock_minimo" min="0" value="5">
                            </div>
                        </div>
                    </div>

                    <div class="campo">
                        <label>Unidad de Medida</label>
                        <select id="unidad_medida">
                            <option value="Piezas">Piezas</option>
                            <option value="Metros">Metros</option>
                            <option value="Kits">Kits</option>
                        </select>
                    </div>

                    <div class="botones-form">
                        <button type="button" class="btn-secundario" onclick="cerrarModalInventario()">Cancelar</button>
                        <button type="submit" class="btn-primario">
                            <i class="fas fa-save"></i> Guardar en Almacén
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/inventario.js"></script>
</body>
</html>
